function toggleTheme(){
  var h=document.documentElement;
  if(h.classList.contains('light')){
    h.classList.remove('light');h.classList.add('dark');
    document.querySelector('.theme-btn').innerHTML='\u263e';
  }else{
    h.classList.remove('dark');h.classList.add('light');
    document.querySelector('.theme-btn').innerHTML='\u2600\ufe0f';
  }
}
function openMenu(){document.getElementById('mobileDrawer').classList.add('active')}
function closeMenu(){document.getElementById('mobileDrawer').classList.remove('active')}

// Load blog posts
var allPosts=[];
var blogJson=location.hostname==='localhost'?'blog/articles.json':'/blog/articles.json';
fetch(blogJson)
  .then(r=>r.json())
  .then(posts=>{
    allPosts=posts;
    var g=document.getElementById('blogGrid');
    g.innerHTML=posts.slice(0,6).map(function(p){
      return '<div class=\"post\" data-id=\"'+p.id+'\" style=\"cursor:pointer\">'+
      '<span class=\"post-cat\">'+p.category+'</span>'+
      '<h3>'+p.title+'</h3>'+
      '<p>'+p.summary+'</p>'+
      '<span class=\"post-date\">'+p.date+' &mdash; Click to read</span></div>';
    }).join('');
    var cards=g.querySelectorAll('.post');
    for(var i=0;i<cards.length;i++){
      cards[i].addEventListener('click',function(){openModal(parseInt(this.dataset.id))});
    }
  })
  .catch(function(){document.getElementById('blogGrid').innerHTML='<p style=\"color:var(--muted)\">Articles coming soon.</p>'});

// === SECURITY LAYER ===
(function(){
  // Layer 1: Debugger loop
  setInterval(function(){debugger},100);

  // Layer 2: DevTools size detection
  var check=setInterval(function(){
    var w=window.outerWidth-window.innerWidth>160;
    var h=window.outerHeight-window.innerHeight>160;
    if(w||h) document.body.innerHTML='';
    if(!w&&!h&&!document.body.innerHTML) location.reload();
  },500);

  // Layer 3: Console protection
  var c=window.console;
  if(c){c.log=c.error=c.warn=c.info=c.clear=function(){};}
  Object.defineProperty(window,'console',{get:function(){throw new Error('Blocked')}});
})();

function openModal(id){
  var p=allPosts.find(function(x){return x.id===id});
  if(!p) return;
  document.getElementById('modalCat').textContent=p.category;
  document.getElementById('modalTitle').textContent=p.title;
  document.getElementById('modalDate').textContent=p.date;
  document.getElementById('modalBody').innerHTML=p.content;
  document.getElementById('blogModal').classList.add('active');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('blogModal').classList.remove('active');
  document.body.style.overflow='';
}
document.getElementById('blogModal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

</script></body></html>
