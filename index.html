<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Danang — Server & Cloud Engineer</title><!-- v3 -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Quicksand',-apple-system,sans-serif;line-height:1.6;font-weight:500}

@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Quicksand',-apple-system,sans-serif;line-height:1.6;font-weight:500}

.light { --bg:#f8f9fb; --bg-card:#fff; --text:#1a1a2e; --muted:#6b7280; --border:#e5e7eb; --red:#e53e3e; --red-light:#fff5f5; --red-dark:#c53030; --blue:#3182ce; --blue-light:#ebf8ff; --green:#38a169; --green-light:#f0fff4; }
.dark  { --bg:#111827; --bg-card:#1f2937; --text:#f3f4f6; --muted:#9ca3af; --border:#374151; --red:#e53e3e; --red-light:#3b1515; --red-dark:#c53030; --blue:#3182ce; --blue-light:#15223b; --green:#38a169; --green-light:#153b21; }

body{background:var(--bg);color:var(--text);transition:background 0.3s,color 0.3s}

nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
nav .logo{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
nav .logo .dot{width:8px;height:8px;background:var(--red);border-radius:50%}
nav .nav-links{display:flex;gap:4px;align-items:center}
nav .nav-links a{color:var(--muted);font-size:13px;font-weight:600;padding:8px 14px;border-radius:20px;transition:all 0.2s}
nav .nav-links a:hover{color:var(--red);background:var(--red-light)}
nav .right{display:flex;align-items:center;gap:8px}
nav .theme-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:50%;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;cursor:pointer}
nav .theme-btn:hover{border-color:var(--red)}
nav .menu-btn{display:none;background:var(--red);color:#fff;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border:none;cursor:pointer}
nav .nav-cta{background:var(--red);color:#fff!important;padding:10px 20px;border-radius:20px;font-weight:700}
nav .nav-cta:hover{background:var(--red-dark);color:#fff!important}

.mobile-drawer{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transform:translateY(-100%);transition:transform 0.3s}
.mobile-drawer.active{transform:translateY(0)}
.mobile-drawer a{font-size:20px;font-weight:700;color:var(--text)}
.mobile-drawer .close-btn{position:absolute;top:16px;right:24px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:20px;font-weight:700;font-size:12px;cursor:pointer}

.container{max-width:1024px;margin:0 auto;padding:0 24px}

.hero{padding:72px 0 48px;text-align:center}
.hero .badge{display:inline-block;background:var(--red-light);color:var(--red);font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:20px;letter-spacing:1px;text-transform:uppercase}
.hero h1{font-size:44px;font-weight:700;line-height:1.2;margin-bottom:16px}
.hero h1 span{color:var(--red);text-decoration:underline;text-underline-offset:6px}
.hero p{font-size:16px;color:var(--muted);max-width:540px;margin:0 auto 28px;line-height:1.8}
.hero .hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.hero .hero-btns a{padding:12px 28px;border-radius:24px;font-weight:700;font-size:14px;transition:all 0.2s}
.hero .hero-btns a.primary{background:var(--red);color:#fff}
.hero .hero-btns a.primary:hover{background:var(--red-dark);transform:translateY(-2px);box-shadow:0 6px 24px rgba(229,62,62,0.25)}
.hero .hero-btns a.outline{background:var(--bg-card);color:var(--text);border:1.5px solid var(--border)}
.hero .hero-btns a.outline:hover{border-color:var(--red);color:var(--red)}

.hero-stats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:44px}
.hero-stats .hs{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:18px 28px;text-align:center;transition:all 0.2s}
.hero-stats .hs:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.05)}
.hero-stats .hs .v{font-size:24px;font-weight:700;display:block}
.hero-stats .hs:nth-child(1) .v{color:var(--red)}
.hero-stats .hs:nth-child(2) .v{color:var(--blue)}
.hero-stats .hs:nth-child(3) .v{color:var(--green)}
.hero-stats .hs .l{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;display:block}

.section{padding:64px 0}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--red);margin-bottom:8px;display:block}
.section-title{font-size:28px;font-weight:700;margin-bottom:32px}

.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.services-grid .card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;transition:all 0.25s}
.services-grid .card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.06);border-color:var(--red)}
.services-grid .card .card-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:16px}
.card-icon.red{background:var(--red-light);color:var(--red)}
.card-icon.blue{background:var(--blue-light);color:var(--blue)}
.card-icon.green{background:var(--green-light);color:var(--green)}
.services-grid .card h3{font-size:15px;font-weight:700;margin-bottom:6px}
.services-grid .card p{font-size:13px;color:var(--muted);line-height:1.7}

.stack-wrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.stack-wrap span{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:8px 18px;font-size:12px;font-weight:600;color:var(--muted);transition:all 0.2s}
.stack-wrap span:hover{border-color:var(--red);color:var(--red);transform:translateY(-1px)}

.cta{background:var(--red);color:#fff;text-align:center;padding:64px 0;position:relative;overflow:hidden}
.cta .section-label{color:rgba(255,255,255,0.7)}
.cta h2{font-size:30px;font-weight:700;margin-bottom:8px}
.cta p{font-size:15px;margin-bottom:24px;opacity:0.85}
.cta a.cta-btn{display:inline-block;background:#fff;color:var(--red);font-weight:700;font-size:14px;padding:14px 34px;border-radius:24px;transition:all 0.2s}
.cta a.cta-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,0.15)}
.cta .contact-info{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:32px}
.cta .contact-info div{background:rgba(255,255,255,0.1);border-radius:12px;padding:16px 24px;text-align:center;min-width:160px}
.cta .contact-info .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;opacity:0.6;display:block;margin-bottom:4px}
.cta .contact-info .val{font-size:14px;font-weight:600}

footer{padding:32px 0;text-align:center}
footer p{font-size:11px;color:var(--muted);font-weight:600}

@media(max-width:768px){nav .nav-links,nav .nav-cta{display:none}nav .menu-btn{display:block}.hero h1{font-size:32px}.hero-stats{gap:6px}.hero-stats .hs{padding:14px 18px}.hero-stats .hs .v{font-size:20px}.services-grid{grid-template-columns:1fr}.section-title{font-size:24px}.cta h2{font-size:26px}.section{padding:48px 0}.hero{padding:48px 0 36px}}

</style>
</head>
